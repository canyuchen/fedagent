federated:
  total_clients: 100
  clients_per_round: 2
  total_rounds: 70
  epochs_per_client: 3
  eval_only_final_round: true
  aggregation_method: fedavg
  fedprox_mu: 0.01
  base_script_path: scripts/verl-agent/grpo/run_webshop.sh
  output_dir: ./output
  training:
    timeout_per_client: 3600
    max_retries: 3
    parallel_workers: 4
  logging:
    level: INFO
    save_client_logs: true
    save_metrics: true
  data_sharding:
    seed: 42
    min_goals_per_client: 100
    partition:
      strategy: uniform
  environment:
    cuda_device: 0
    python_path: /usr/bin/python3
  rounds:
    wait_between_rounds: 5
    save_checkpoints: true
  max_rounds_to_keep_client_checkpoints: 2
verl:
  algorithm:
    adv_estimator: grpo
    use_kl_in_reward: false
  data:
    train_files: data/verl-agent_webshop_grpo/text/train.parquet
    val_files: data/verl-agent_webshop_grpo/text/test.parquet
    train_batch_size: 8
    val_batch_size: 64
    max_prompt_length: 4096
    max_response_length: 512
    filter_overlong_prompts: true
    truncation: error
    return_raw_chat: true
  actor_rollout_ref:
    model:
      path: Qwen/Qwen2.5-7B-Instruct
      tokenizer_path: Qwen/Qwen2.5-7B-Instruct
      enable_gradient_checkpointing: true
      use_remove_padding: true
    actor:
      optim:
        lr: '1e-6'
      ppo_mini_batch_size: 64
      ppo_micro_batch_size_per_gpu: 8
      use_kl_loss: true
      kl_loss_coef: 0.01
      kl_loss_type: low_var_kl
      fsdp_config:
        param_offload: false
        optimizer_offload: false
      use_invalid_action_penalty: true
      invalid_action_penalty_coef: 0.1
      checkpoint:
        contents:
        - model
    rollout:
      name: vllm
      tensor_model_parallel_size: 4
      gpu_memory_utilization: 0.5
      log_prob_micro_batch_size_per_gpu: 8
      enable_chunked_prefill: true
      enforce_eager: false
      free_cache_engine: false
      prompt_length: 4096
      max_model_len: 4096
      response_length: 512
      val_kwargs:
        temperature: 0.4
        do_sample: true
    ref:
      log_prob_micro_batch_size_per_gpu: 8
      fsdp_config:
        param_offload: true
  env:
    env_name: Webshop
    seed: 0
    max_steps: 15
    rollout:
      n: 8
    webshop:
      use_small: true
  trainer:
    critic_warmup: 0
    logger:
    - console
    project_name: verl_agent_webshop_federated
    experiment_name: grpo_qwen2.5_7b_uniform_main
    n_gpus_per_node: 4
    nnodes: 1
    save_freq: -1
    test_freq: 5
    total_epochs: 100
    val_before_train: true
    save_dir: null
data_preprocess:
  mode: text
  train_data_size: 8
  val_data_size: 64
  local_dir: null
