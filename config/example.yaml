# =============================================================================
# FedAgent — annotated example configuration
# =============================================================================
# Every FedAgent experiment is a single YAML file with three top-level blocks:
#   federated:        FedAgent's own federation / aggregation / partition settings
#   verl:             the underlying verl-agent (veRL) training config, passed
#                     through to each client's trainer
#   data_preprocess:  how the WebShop / ALFWorld dataset shards are built
#
# This file documents every field on the canonical "main table" run
# (WebShop, GRPO, uniform client distribution, Qwen2.5-1.5B-Instruct). The
# curated per-experiment configs under
#   config/{uniform,task_heterogeneity,env_heterogeneity,decentralized}/
# follow exactly this schema — copy the one closest to your experiment and edit
# the few keys you need.
#
# See docs/configuration.md for the full field reference and the filename
# naming convention, and docs/heterogeneity.md for the partition strategies.
# =============================================================================

federated:
  # ---- Federation topology ----
  total_clients: 100           # size of the client pool the data is partitioned across
  clients_per_round: 2         # clients sampled & trained each round
  total_rounds: 70             # number of federated rounds (server aggregations)
  epochs_per_client: 3         # local training epochs each selected client runs per round
  eval_only_final_round: true  # round total_rounds+1 is val-only (no FedAvg) for a clean final eval

  # ---- Aggregation ----
  aggregation_method: fedavg   # how client models are combined: "fedavg" or "fedprox"
  fedprox_mu: 0.01             # FedProx proximal coefficient (used only when aggregation_method: fedprox)

  # ---- Per-client launch ----
  base_script_path: scripts/verl-agent/grpo/run_webshop.sh  # base verl-agent train script (env + algo specific)
  output_dir: ./output         # root for per-run outputs (checkpoints, metrics, logs)

  training:
    timeout_per_client: 3600   # seconds before a stuck client is killed
    max_retries: 3             # retries for a failed client before giving up
    parallel_workers: 4        # clients trained concurrently per round (1 = sequential; cf. reproduce.sh --mode)

  logging:
    level: INFO
    save_client_logs: true
    save_metrics: true

  # ---- Client data partitioning (the heterogeneity knob) ----
  data_sharding:
    seed: 42                   # deterministic client -> data assignment
    min_goals_per_client: 100  # minimum training tasks per client
    partition:
      # `strategy` selects HOW the pool is split across clients:
      #   uniform                                  i.i.d. split (the baseline; used here)
      #   --- Task-level heterogeneity (clients differ in their task distribution) ---
      #   preference   (kwargs: omega)             Dirichlet skew over product categories
      #   coverage     (kwargs: size_std)          dispersion of per-client pool sizes
      #   hardness     (kwargs: success_std)       dispersion of per-client task difficulty
      #   --- Environment-level heterogeneity (clients differ in WebShop transition kernel) ---
      #   catalog_split       (kwargs: env_div, keep_ratio)  per-client product subset (Catalog Split)
      #   bm25_variant        (kwargs: N, variant_pool)      per-client BM25 search config:
      #                          variant_pool: fields_only -> Field-Subset Index
      #                          variant_pool omitted      -> BM25 Reweighting (extreme k1/b)
      #   lookalike_injection (kwargs: N)                    per-client adversarial lookalike products
      #   rank_wrapper        (kwargs: N)                    per-client search-result post-processing
      # See docs/heterogeneity.md for the full taxonomy and the paper mapping.
      strategy: uniform
      # kwargs:                # strategy-specific parameters (none for uniform), e.g.:
      #   omega: 0.99          #   preference: skew strength in (0, 1)

  environment:
    cuda_device: 0
    python_path: /usr/bin/python3

  rounds:
    wait_between_rounds: 5
    save_checkpoints: true

  max_rounds_to_keep_client_checkpoints: 2  # disk hygiene: prune old per-client checkpoints

# =============================================================================
# verl: the underlying verl-agent training config (passed through to each client).
# Only the FedAgent-relevant knobs are highlighted here; for the complete verl
# reference, see the vendored third_party/verl-agent.
# =============================================================================
verl:
  algorithm:
    adv_estimator: grpo        # policy-optimization algorithm: "grpo" or "gae" (PPO)
    use_kl_in_reward: false

  data:
    train_files: data/verl-agent_webshop_grpo/text/train.parquet  # produced by download_data.sh + data_preprocess
    val_files: data/verl-agent_webshop_grpo/text/test.parquet
    train_batch_size: 8
    val_batch_size: 64
    max_prompt_length: 4096
    max_response_length: 512
    filter_overlong_prompts: true
    truncation: error
    return_raw_chat: true

  actor_rollout_ref:
    model:
      path: Qwen/Qwen2.5-1.5B-Instruct            # agent backbone (HF id or local path)
      tokenizer_path: Qwen/Qwen2.5-1.5B-Instruct
      enable_gradient_checkpointing: true
      use_remove_padding: true
    actor:
      optim:
        lr: '1e-6'
      ppo_mini_batch_size: 64
      ppo_micro_batch_size_per_gpu: 8
      use_kl_loss: true
      kl_loss_coef: 0.01
      kl_loss_type: low_var_kl
      fsdp_config:
        param_offload: false          # FSDP parameter CPU offload (cf. reproduce.sh --fsdp on/off)
        optimizer_offload: false
      use_invalid_action_penalty: true # penalize malformed agent actions
      invalid_action_penalty_coef: 0.1
      checkpoint:
        contents: [model]
    rollout:
      name: vllm
      tensor_model_parallel_size: 4   # vLLM tensor-parallel degree; tracks GPU count (4 = paper default)
      gpu_memory_utilization: 0.5
      log_prob_micro_batch_size_per_gpu: 16
      enable_chunked_prefill: true
      enforce_eager: false
      free_cache_engine: false
      prompt_length: 4096
      max_model_len: 4096
      response_length: 512
      val_kwargs:
        temperature: 0.4
        do_sample: true
    ref:
      log_prob_micro_batch_size_per_gpu: 16
      fsdp_config:
        param_offload: true

  env:
    env_name: Webshop           # "Webshop" or "alfworld/AlfredTWEnv"
    seed: 0
    max_steps: 15               # max agent steps per episode
    rollout:
      n: 8                      # GRPO group size (rollouts per prompt)
    webshop:
      use_small: true

  trainer:
    critic_warmup: 0
    logger: [console]           # W&B removed in this release; add your own tracker if desired
    project_name: verl_agent_webshop_federated
    experiment_name: grpo_qwen2.5_1.5b_uniform_main
    n_gpus_per_node: 4          # GPUs per node (cf. reproduce.sh --gpus / --single-gpu)
    nnodes: 1                   # node count; the paper's results are all single-node
    save_freq: -1
    test_freq: 5                # run validation every 5 rounds (val/success_rate = the reported metric)
    total_epochs: 100
    val_before_train: true      # evaluate at round 0 before any training
    save_dir: null

# =============================================================================
# data_preprocess: how the dataset shards (train/test parquet) are built.
# =============================================================================
data_preprocess:
  mode: text
  train_data_size: 8
  val_data_size: 64
  local_dir: null
