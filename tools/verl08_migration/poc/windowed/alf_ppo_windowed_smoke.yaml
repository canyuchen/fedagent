# WINDOWED (faithful) PPO ALFWorld SMOKE — exercises the CRITIC mini-batch split path with the
# per-turn windowed batch (adv_estimator=gae -> actor + critic both federated). Verifies the
# divisor is critic-aware (lcm includes critic.ppo_mini*n). Mirrors alf_grpo_windowed_smoke.yaml.
env_kind: alfworld
env_spec: /gpfs/projects/b1222/userdata/canyu/kangyu/fedagent/_scratch/windowed_poc/alfworld_windowed_smoke.yaml
val_env_spec: /gpfs/projects/b1222/userdata/canyu/kangyu/fedagent/_scratch/windowed_poc/alfworld_windowed_smoke.yaml
agent_config_path: /gpfs/projects/b1222/userdata/canyu/kangyu/fedagent/_scratch/windowed_poc/agent_windowed.yaml
output_dir: /gpfs/projects/b1222/userdata/canyu/kangyu/fedagent/_scratch/windowed_poc/runs/ppo_windowed_smoke
model_path: Qwen/Qwen2.5-1.5B-Instruct

adv_estimator: gae

total_clients: 2
clients_per_round: 2
total_rounds: 1
epochs_per_round: 1
base_seed: 42

n_gpus_per_node: 4
total_training_steps: 0
save_freq: 100000
test_freq: 1000
val_before_train: false
val_temperature: 0.4
wait_between_clients: 8
min_goals_per_client: 50
alfworld_pool_size: 8
alfworld_base_port: 41800
alfworld_val_port: 41900
partition_strategy: ""

client_overrides:
  - data.train_batch_size=4
  - data.max_prompt_length=2048
  - data.max_response_length=512
  - actor_rollout_ref.actor.ppo_mini_batch_size=4
  - actor_rollout_ref.rollout.n=4
  - actor_rollout_ref.rollout.prompt_length=2048
  - actor_rollout_ref.rollout.response_length=512
  - actor_rollout_ref.rollout.max_model_len=2560
  - actor_rollout_ref.rollout.gpu_memory_utilization=0.6
  - critic.ppo_mini_batch_size=4
  - critic.ppo_micro_batch_size_per_gpu=4
  - critic.model.use_remove_padding=true
  - critic.checkpoint.save_contents=[model]
  - trainer.critic_warmup=0
  - +actor_rollout_ref.rollout.agent.agent_loop_manager_class=fedagent.agent_loops.windowed_manager.WindowedAgentLoopManager
