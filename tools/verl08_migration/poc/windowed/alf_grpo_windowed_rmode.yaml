# WINDOWED via the NEW rollout_mode switch (NOT a manual manager_class override). Validates that
# rollout_mode=windowed auto-injects WindowedAgentLoopManager into train+eval. Same as the verified
# windowed smoke otherwise. env spec uses gym_text_windowed + history_length=2.
env_kind: alfworld
env_spec: /gpfs/projects/b1222/userdata/canyu/kangyu/fedagent/_scratch/windowed_poc/alfworld_windowed_smoke.yaml
val_env_spec: /gpfs/projects/b1222/userdata/canyu/kangyu/fedagent/_scratch/windowed_poc/alfworld_windowed_smoke.yaml
agent_config_path: /gpfs/projects/b1222/userdata/canyu/kangyu/fedagent/_scratch/windowed_poc/agent_windowed.yaml
output_dir: /gpfs/projects/b1222/userdata/canyu/kangyu/fedagent/_scratch/windowed_poc/runs/grpo_windowed_rmode
model_path: Qwen/Qwen2.5-1.5B-Instruct

adv_estimator: grpo
rollout_mode: windowed            # <-- the switch under test (auto-injects the windowed manager)

total_clients: 2
clients_per_round: 2
total_rounds: 1
epochs_per_round: 1
base_seed: 42

n_gpus_per_node: 4
total_training_steps: 0
save_freq: 100000
test_freq: 1000
val_before_train: false
val_temperature: 0.4
wait_between_clients: 8
min_goals_per_client: 50
alfworld_pool_size: 8
alfworld_base_port: 41600
alfworld_val_port: 41700
partition_strategy: ""

client_overrides:
  - data.train_batch_size=4
  - data.max_prompt_length=2048
  - data.max_response_length=512
  - actor_rollout_ref.actor.ppo_mini_batch_size=4
  - actor_rollout_ref.rollout.n=4
  - actor_rollout_ref.rollout.prompt_length=2048
  - actor_rollout_ref.rollout.response_length=512
  - actor_rollout_ref.rollout.max_model_len=2560
  - actor_rollout_ref.rollout.gpu_memory_utilization=0.6
