# ALFWorld CONCAT (stock full-history) smoke env-spec. agent_name=gym_text + history_length=0 ->
# stock GymTextAgentLoop (1 sample/episode, full multi-turn chat as literal history). The other mode.
envs:
  - name: ALFWorld
    n_envs: 4
    max_turns: 10
    agent_name: gym_text
    config:
      timeout: 180.0
      history_length: 0          # 0 -> CONCAT (no windowed template; loop carries history as chat)
