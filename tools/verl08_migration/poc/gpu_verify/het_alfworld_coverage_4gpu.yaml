# 1-GPU ALFWorld GRPO federated FULL loop (the 2nd env -- only OOM-probed at 4-GPU before).
# 0.5B / 2 clients / 2 rounds: round-2 starts from the FedAvg'd+merged model => confirms the
# ALFWorld federated loop end-to-end (service shard -> train -> FedAvg ws=1 -> merge -> next round).
env_kind: alfworld
env_spec: /gpfs/projects/b1222/userdata/canyu/kangyu/fedagent/_scratch/gpu_verify/alfworld_smoke_spec.yaml
val_env_spec: ""
output_dir: /tmp/xbb9020_alf_cov4
model_path: /projects/b1222/.cache/huggingface/hub/models--Qwen--Qwen2.5-1.5B-Instruct/snapshots/989aa7980e4cf806f80c7fef2b1adb7bc71aa306

total_clients: 2
clients_per_round: 2
total_rounds: 2
epochs_per_round: 1
base_seed: 42

n_gpus_per_node: 4
total_training_steps: 1
save_freq: 1
wait_between_clients: 8
partition_strategy: coverage
size_std: 256
alfworld_pool_size: 16          # >= gen_batch (train_batch_size 8 x rollout.n 2 = 16)
alfworld_base_port: 8850
alfworld_train_eval: train

client_overrides:
  - data.train_batch_size=8
  - data.max_prompt_length=2048
  - data.max_response_length=4096
  - actor_rollout_ref.actor.ppo_mini_batch_size=8
  - actor_rollout_ref.rollout.n=2
  - actor_rollout_ref.rollout.prompt_length=2048
  - actor_rollout_ref.rollout.response_length=4096
  - actor_rollout_ref.rollout.max_model_len=8192
  - actor_rollout_ref.rollout.gpu_memory_utilization=0.5
