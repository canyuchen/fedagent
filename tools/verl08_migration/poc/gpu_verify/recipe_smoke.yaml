# Recipe-verification smoke (NOT for commit): exercises this round's fixes end-to-end.
#   B-A total_training_steps=0 -> run_fed emits null -> verl runs FULL epochs (expect 2 steps/round
#       since n_envs=8 / train_batch=8 / epochs_per_round=2; watch log "Total training steps: 2").
#   B-C n_envs=8 (webshop_15.yaml) -> 1 step/epoch.
#   B-G/B-G2 round-threaded FEDAGENT_BASE_SEED + random.Random goal pick -> goals differ round1 vs round2.
#   B3 preference partition computed from env.server.goals at runtime.
env_kind: webshop
env_spec: config/envs/webshop_15.yaml
model_path: /projects/b1222/.cache/huggingface/hub/models--Qwen--Qwen2.5-1.5B-Instruct/snapshots/989aa7980e4cf806f80c7fef2b1adb7bc71aa306
output_dir: /tmp/xbb9020_recipe_smoke

total_clients: 2
clients_per_round: 2
total_rounds: 2
epochs_per_round: 2
base_seed: 42

n_gpus_per_node: 4
total_training_steps: 0          # B-A: 0 => run_fed emits null => full epochs (no smoke cap)
save_freq: 100000
test_freq: -1                    # skip val for speed (recipe-only smoke)
wait_between_clients: 8
min_goals_per_client: 100
partition_strategy: preference   # B3 task-het (runtime env.server.goals)
omega: 0.5
webshop_pool_size: 8
webshop_base_port: 8400

client_overrides:
  - data.train_batch_size=8
  - data.max_prompt_length=2048
  - data.max_response_length=6144
  - actor_rollout_ref.actor.ppo_mini_batch_size=8
  - actor_rollout_ref.rollout.n=8
  - actor_rollout_ref.rollout.prompt_length=2048
  - actor_rollout_ref.rollout.response_length=6144
  - actor_rollout_ref.rollout.max_model_len=8192
  - actor_rollout_ref.rollout.gpu_memory_utilization=0.6
