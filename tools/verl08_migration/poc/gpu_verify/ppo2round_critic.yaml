# 2-round WebShop PPO (gae+critic) to verify the one untested path after the storm patch:
# round 2 trains FROM round-1's aggregated/merged critic_hf (federated-critic reload).
# Small batch=8, 2 steps/round -> fast (~30-40 min). Storm is irrelevant here (pool=8 >= 64-ep
# trickle); the point is merge->reload of BOTH actor hf and critic_hf across a round boundary.
env_kind: webshop
env_spec: config/envs/webshop_15_ppo.yaml
val_env_spec: ""
output_dir: /tmp/xbb9020_ppo2round_critic
model_path: /projects/b1222/.cache/huggingface/hub/models--Qwen--Qwen2.5-1.5B-Instruct/snapshots/989aa7980e4cf806f80c7fef2b1adb7bc71aa306
adv_estimator: gae
total_clients: 2
clients_per_round: 2
total_rounds: 2
epochs_per_round: 1
base_seed: 42
n_gpus_per_node: 4
total_training_steps: 2
save_freq: 100000
test_freq: -1
wait_between_clients: 8
min_goals_per_client: 100
partition_strategy: catalog_split
search_return_n: 200
webshop_pool_size: 8
webshop_base_port: 9780
client_overrides:
  - data.train_batch_size=8
  - data.max_prompt_length=2048
  - data.max_response_length=6144
  - actor_rollout_ref.actor.ppo_mini_batch_size=8
  - actor_rollout_ref.rollout.n=8
  - actor_rollout_ref.rollout.prompt_length=2048
  - actor_rollout_ref.rollout.response_length=6144
  - actor_rollout_ref.rollout.max_model_len=8192
  - actor_rollout_ref.rollout.gpu_memory_utilization=0.5
  - actor_rollout_ref.actor.optim.lr=1e-6
  - actor_rollout_ref.actor.use_kl_loss=true
  - actor_rollout_ref.actor.kl_loss_coef=0.01
  - actor_rollout_ref.actor.kl_loss_type=low_var_kl
  - actor_rollout_ref.actor.fsdp_config.optimizer_offload=true
  - actor_rollout_ref.actor.checkpoint.save_contents=[model]
  - critic.optim.lr=1e-5
  - critic.model.use_remove_padding=true
  - critic.model.enable_gradient_checkpointing=true
  - critic.fsdp.optimizer_offload=true
  - critic.ppo_micro_batch_size_per_gpu=4
  - critic.checkpoint.save_contents=[model]
  - trainer.critic_warmup=0
env_div: 0.7
keep_ratio: 0.7
