# GPU smoke: WebShop GRPO federated, exercises the review fixes.
#  #1 lazy per-round services: total_clients=4 > clients_per_round=2 -> each round starts ONLY
#     the 2 selected clients' services (not all 4); 2 rounds -> closes the loop from the merged model.
#  #3 dataset fail-fast: env_spec is a REAL webshop spec -> must load (no TinyGuess fallback).
#  #5 FedProx fail-closed: fedprox_mu=0.1 -> each client's training.log must show "[fedprox] enabled".
#  search_return_n=50: the new homog/baseline default.
env_kind: webshop
env_spec: config/envs/webshop_15.yaml
val_env_spec: ""                 # skip val (this smoke checks the train loop + lazy startup)
output_dir: /tmp/xbb9020_smoke_webshop_lazy
model_path: /projects/b1222/.cache/huggingface/hub/models--Qwen--Qwen2.5-0.5B-Instruct/snapshots/7ae557604adf67be50417f59c2c2f167def9a775

total_clients: 4
clients_per_round: 2
total_rounds: 2
epochs_per_round: 1
base_seed: 42

n_gpus_per_node: 4
total_training_steps: 0
save_freq: 100000
test_freq: -1
wait_between_clients: 8
min_goals_per_client: 100
partition_strategy: ""
search_return_n: 50
webshop_pool_size: 8
webshop_base_port: 8400
fedprox_mu: 0.1

client_overrides:
  - data.train_batch_size=8
  - data.max_prompt_length=2048
  - data.max_response_length=6144
  - actor_rollout_ref.actor.ppo_mini_batch_size=8
  - actor_rollout_ref.rollout.n=8
  - actor_rollout_ref.rollout.prompt_length=2048
  - actor_rollout_ref.rollout.response_length=6144
  - actor_rollout_ref.rollout.max_model_len=8192
  - actor_rollout_ref.rollout.gpu_memory_utilization=0.6
