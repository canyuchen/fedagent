# ALFWorld env-spec for BOUNDED (sliding-window, per-turn) rollout (OPT-IN, experimental).
# Identical to alfworld.yaml except agent_name=gym_text_bounded, which selects
# fedagent.agent_loops.bounded_worker.BoundedGymTextAgentLoop. Must be paired with
# +actor_rollout_ref.rollout.agent.agent_loop_manager_class=fedagent.agent_loops.bounded_worker.BoundedAgentLoopManager
# in the run's client_overrides (so verl uses the per-turn worker). See bounded_worker.py.
envs:
  - name: ALFWorld
    n_envs: 8
    max_turns: 50
    agent_name: gym_text_bounded
    config:
      timeout: 180.0
