# Bounded (per-turn, sliding-window) GRPO ALFWorld SMOKE — POC validation only.
# Goal: does the bounded manager/worker run end-to-end (batch-contract OK?) and does the
# windowed generation reduce gen vs the unbounded concat? Minimal batch for fast iteration.
env_kind: alfworld
env_spec: /gpfs/projects/b1222/userdata/canyu/kangyu/fedagent/_scratch/bounded_poc/alfworld_bounded_smoke.yaml
val_env_spec: /gpfs/projects/b1222/userdata/canyu/kangyu/fedagent/_scratch/bounded_poc/alfworld_bounded_smoke.yaml
agent_config_path: /gpfs/projects/b1222/userdata/canyu/kangyu/fedagent/_scratch/bounded_poc/agent_bounded.yaml
output_dir: /gpfs/projects/b1222/userdata/canyu/kangyu/fedagent/_scratch/bounded_poc/runs/grpo_bounded_smoke
model_path: Qwen/Qwen2.5-1.5B-Instruct

adv_estimator: grpo

total_clients: 2
clients_per_round: 2
total_rounds: 1
epochs_per_round: 1
base_seed: 42

n_gpus_per_node: 4
total_training_steps: 0
save_freq: 100000
test_freq: 1000              # effectively no round-end eval for the smoke
val_before_train: false
val_temperature: 0.4
wait_between_clients: 8
min_goals_per_client: 50
alfworld_pool_size: 8
alfworld_base_port: 41000
alfworld_val_port: 41100
partition_strategy: ""

client_overrides:
  - data.train_batch_size=4          # must be >= ppo_mini_batch_size (stock verl config check)
  - data.max_prompt_length=2048
  - data.max_response_length=512
  - actor_rollout_ref.actor.ppo_mini_batch_size=4
  - actor_rollout_ref.rollout.n=4
  - actor_rollout_ref.rollout.prompt_length=2048
  - actor_rollout_ref.rollout.response_length=512
  - actor_rollout_ref.rollout.max_model_len=2560
  - actor_rollout_ref.rollout.gpu_memory_utilization=0.6
  - +actor_rollout_ref.rollout.agent.agent_loop_manager_class=bounded_worker.BoundedAgentLoopManager
