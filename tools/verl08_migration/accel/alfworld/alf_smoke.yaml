# game data) + training run end-to-end before the eval-mode sweep. 0.5B, 1 client, 1 round, 1 GPU,
# eval OFF, short rollout. Output -> gitignored runs/ (NOT _scratch).
env_kind: alfworld
env_spec: config/envs/alfworld.yaml
val_env_spec: ""
output_dir: /gpfs/projects/b1222/userdata/canyu/kangyu/fedagent/runs/alf_smoke
