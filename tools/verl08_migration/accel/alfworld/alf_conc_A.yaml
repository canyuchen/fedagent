# ALFWorld Tier-1 concurrency test, job A. Two independent run_fed TRAINING jobs (A on GPUs 0,1;
# B on GPUs 2,3) run CONCURRENTLY on one node — each its own isolated Ray cluster (same first
# job_id 01000000) + its own ALFWorld service, both doing FSDP->vLLM weight sync at once. This is
# the exact path that ZMQ-deadlocked before the VERL_RAY_JOB_ID fix. PASS = both rc=0 (fix holds
# under ALFWorld's heavier 2-service load). Output -> gitignored runs/alf_conc/A.
env_kind: alfworld
env_spec: config/envs/alfworld.yaml
val_env_spec: ""
output_dir: /gpfs/projects/b1222/userdata/canyu/kangyu/fedagent/runs/alf_conc/A
model_path: /projects/b1222/.cache/huggingface/hub/models--Qwen--Qwen2.5-1.5B-Instruct/snapshots/989aa7980e4cf806f80c7fef2b1adb7bc71aa306
total_clients: 1
clients_per_round: 1
total_rounds: 1
epochs_per_round: 1
total_training_steps: 1
base_seed: 42
val_before_train: false
save_freq: 100000
min_goals_per_client: 8
alfworld_pool_size: 8
alfworld_base_port: 41000
cleanup_checkpoints: false
partition_strategy: ""
n_gpus_per_node: 2
client_overrides:
  - data.train_batch_size=8
  - data.max_prompt_length=2048
  - data.max_response_length=4096
  - actor_rollout_ref.actor.ppo_mini_batch_size=8
  - actor_rollout_ref.rollout.n=8
  - actor_rollout_ref.rollout.prompt_length=2048
  - actor_rollout_ref.rollout.response_length=4096
  - actor_rollout_ref.rollout.max_model_len=6144
  - actor_rollout_ref.rollout.gpu_memory_utilization=0.6
  - actor_rollout_ref.actor.checkpoint.save_contents=[model]
