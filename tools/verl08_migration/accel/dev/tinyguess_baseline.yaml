# Acceleration baseline timing smoke (Phase 0 of docs/acceleration.md).
# Same proven TinyGuess federated path as config/examples/tinyguess_2cl_2rd.yaml,
# but 4 GPUs (paper-matched FSDP world_size) and 3 steps/client (a fairer
# cold-start-vs-steptime ratio than the 1-step extreme). In-process env (no
# service warmup) so this isolates the per-(client,round) SUBPROCESS cold-start.
model_path: ""                 # auto-discover local Qwen2.5-0.5B-Instruct
output_dir: /gpfs/projects/b1222/userdata/canyu/kangyu/fedagent/_scratch/accel/baseline_out
# concat = stock GymTextAgentLoop (proven). NOTE: rollout_mode defaults to "windowed",
# which injects WindowedAgentLoopManager -> needs agent.yaml to register gym_text_windowed
# (the PAUSED config migration); with stock agent.yaml the windowed default crashes with
# AttributeError('GymTextAgentLoop' has no 'run_episode_windowed'). Baseline timing is
# rollout-mode-independent (cold-start = Ray+FSDP+vLLM+kernels), so concat is fine here.
rollout_mode: concat
total_clients: 2
clients_per_round: 2
total_rounds: 2
epochs_per_round: 1
base_seed: 42
n_gpus_per_node: 4             # paper-matched 4-GPU FSDP
total_training_steps: 3        # a few steps so step-time is visible vs cold-start
save_freq: 1                   # guarantee a checkpoint for aggregation (proven path)
wait_between_clients: 5
