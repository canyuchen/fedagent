# WebShop per-client routing smoke (lever #4): 2 clients share ONE persistent process; each must hit
# its OWN service (ports 8100/8101) via FEDAGENT_SERVICE_URL_FILE. rc=0 + BOTH service logs showing
# traffic + the worker's "route client c -> :810c" lines = routing works end-to-end on the real env.
env_kind: webshop
env_spec: config/envs/webshop.yaml
output_dir: /gpfs/projects/b1222/userdata/canyu/kangyu/fedagent/_scratch/accel/ws_route_out
model_path: /projects/b1222/.cache/huggingface/hub/models--Qwen--Qwen2.5-0.5B-Instruct/snapshots/7ae557604adf67be50417f59c2c2f167def9a775
rollout_mode: concat
persistent: true
total_clients: 2
clients_per_round: 2
total_rounds: 1
epochs_per_round: 1
base_seed: 42
n_gpus_per_node: 2
total_training_steps: 1
save_freq: 1
cleanup_checkpoints: false
partition_strategy: ""
webshop_pool_size: 16
webshop_base_port: 8100
client_overrides:
  - data.train_batch_size=8
  - data.max_prompt_length=2048
  - data.max_response_length=2048
