# WebShop cross-round + per-round eval: tests (a) routing across rounds in ONE process, and (b) the
# eval-coexistence risk — the GPU-holding worker idles between rounds while eval_global() spawns its
# own vLLM val pass. rc=0 + eval metrics each round = both work; an OOM here is the real #3 finding.
env_kind: webshop
env_spec: config/envs/webshop.yaml
val_env_spec: /gpfs/projects/b1222/userdata/canyu/kangyu/fedagent/tools/verl08_migration/accel/webshop_val_tiny.yaml
output_dir: /gpfs/projects/b1222/userdata/canyu/kangyu/fedagent/_scratch/accel/ws_xround_val_out
model_path: /projects/b1222/.cache/huggingface/hub/models--Qwen--Qwen2.5-0.5B-Instruct/snapshots/7ae557604adf67be50417f59c2c2f167def9a775
rollout_mode: concat
cross_round: true
total_clients: 2
clients_per_round: 2
total_rounds: 2
epochs_per_round: 1
base_seed: 42
n_gpus_per_node: 2
total_training_steps: 1
save_freq: 1
test_freq: 1
cleanup_checkpoints: false
partition_strategy: ""
webshop_pool_size: 16
webshop_base_port: 8120
webshop_val_port: 8090
client_overrides:
  - data.train_batch_size=8
  - data.max_prompt_length=2048
  - data.max_response_length=2048
  - actor_rollout_ref.actor.ppo_mini_batch_size=8
  - actor_rollout_ref.rollout.n=2
  - actor_rollout_ref.rollout.prompt_length=2048
  - actor_rollout_ref.rollout.response_length=2048
  - actor_rollout_ref.rollout.max_model_len=4096
  - actor_rollout_ref.rollout.gpu_memory_utilization=0.6
