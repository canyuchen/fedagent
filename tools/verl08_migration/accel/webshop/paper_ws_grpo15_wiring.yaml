# WIRING TEST of the REAL paper config: uniform/Qwen2.5-1.5B/main/grpo/webshop.
# Identical to the canonical paper config EXCEPT: model->local snapshot, output_dir->GPFS,
# total_rounds 70->2 (wiring only), + cross_round/worker accel path. Everything that matters for
# "does the real config wire up" is kept at paper settings: G=8, response 512, prompt 4096,
# webshop_15 (15-turn) env, 100-client/2-per-round uniform partition, full 3 epochs/round, val temp 0.4.
env_kind: webshop
env_spec: config/envs/webshop_15.yaml
val_env_spec: config/envs/webshop_15_val.yaml
output_dir: /gpfs/projects/b1222/userdata/canyu/kangyu/fedagent/_scratch/accel/paper_ws_grpo15_wiring_out
model_path: /projects/b1222/.cache/huggingface/hub/models--Qwen--Qwen2.5-1.5B-Instruct/snapshots/989aa7980e4cf806f80c7fef2b1adb7bc71aa306
total_clients: 100
clients_per_round: 2
total_rounds: 2                                     # WIRING: 70 -> 2
epochs_per_round: 3
base_seed: 42
n_gpus_per_node: 4
total_training_steps: 0                             # full E epochs/round (paper)
save_freq: 100000
test_freq: 5
val_before_train: true
val_temperature: 0.4
wait_between_clients: 8
min_goals_per_client: 100
webshop_pool_size: 16
webshop_base_port: 10000
webshop_val_port: 10100
search_return_n: 50
partition_strategy: ""
cross_round: true                                   # accel path (validated 1.5B); worker eval on hot engine
eval_mode: worker
client_overrides:
  - data.train_batch_size=8
  - data.max_prompt_length=4096
  - data.max_response_length=512
  - actor_rollout_ref.actor.ppo_mini_batch_size=8
  - actor_rollout_ref.rollout.n=8
  - actor_rollout_ref.rollout.prompt_length=4096
  - actor_rollout_ref.rollout.response_length=512
  - actor_rollout_ref.rollout.max_model_len=4608
  - actor_rollout_ref.rollout.gpu_memory_utilization=0.6
  - actor_rollout_ref.actor.checkpoint.save_contents=[model]
