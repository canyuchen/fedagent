# Lever-#2 A/B (docs/acceleration.md), control arm: prewarm OFF (current behavior).
# 4 clients, 2/round, 3 rounds, base_seed=1 -> R1=[1,2] R2=[0,3] R3=[1,2]: both consecutive
# transitions are DISJOINT, so with prewarm ON the next round's WebShop services warm during
# the current round's FedAvg/merge. total_training_steps=1 (we measure SERVICE scheduling, not
# training quality). concat avoids the windowed-default crash (agent.yaml has only gym_text).
env_kind: webshop
env_spec: config/envs/webshop.yaml
model_path: ""                  # auto-discover Qwen2.5-0.5B-Instruct (fast)
output_dir: /gpfs/projects/b1222/userdata/canyu/kangyu/fedagent/_scratch/accel/webshop_off_out
rollout_mode: concat

total_clients: 4
clients_per_round: 2
total_rounds: 3
base_seed: 1
epochs_per_round: 1

n_gpus_per_node: 4
total_training_steps: 1
save_freq: 1
wait_between_clients: 8

partition_strategy: ""          # homogeneous (simplest); services still warm a pool per client
webshop_pool_size: 8            # >= gen_batch (train_batch 4 x rollout.n 2)
webshop_base_port: 8080
min_goals_per_client: 100

prewarm_next_round_services: false

client_overrides:
  - data.train_batch_size=4
  - data.max_prompt_length=2048
  - data.max_response_length=1024
  - actor_rollout_ref.actor.ppo_mini_batch_size=4
  - actor_rollout_ref.rollout.n=2
  - actor_rollout_ref.rollout.prompt_length=2048
  - actor_rollout_ref.rollout.response_length=1024
