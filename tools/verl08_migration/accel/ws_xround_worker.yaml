# eval_mode=worker: cross_round worker evals each round's starting model on its OWN hot vLLM (verl
# _validate) -> no second engine, no eval cold-start, no OOM. Saturated-node answer. Worker dumps
# round_0..T-1 val_samples; orchestrator finals model_T after the worker stops.
env_kind: webshop
env_spec: config/envs/webshop.yaml
val_env_spec: /gpfs/projects/b1222/userdata/canyu/kangyu/fedagent/_scratch/accel/webshop_val_tiny.yaml
output_dir: /gpfs/projects/b1222/userdata/canyu/kangyu/fedagent/_scratch/accel/ws_xround_worker_out
model_path: /projects/b1222/.cache/huggingface/hub/models--Qwen--Qwen2.5-0.5B-Instruct/snapshots/7ae557604adf67be50417f59c2c2f167def9a775
rollout_mode: concat
cross_round: true
eval_mode: worker
total_clients: 2
clients_per_round: 2
total_rounds: 2
epochs_per_round: 1
base_seed: 42
n_gpus_per_node: 2
total_training_steps: 1
save_freq: 1
test_freq: 1
cleanup_checkpoints: false
partition_strategy: ""
webshop_pool_size: 16
webshop_base_port: 8100
webshop_val_port: 8090
client_overrides:
