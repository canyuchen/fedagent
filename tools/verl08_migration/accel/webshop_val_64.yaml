# Standalone-eval val set for the "2 train + 2 eval" complete test: 64 unperturbed WebShop
# val goals at the paper's 15-step budget -- a realistic per-round eval workload (not a toy),
# so "does eval hide under 1-GPU training?" is a stringent test, not a trivial one.
envs:
  - name: WebShop
    n_envs: 64
    max_turns: 15
    agent_name: gym_text
    config:
      timeout: 180.0
