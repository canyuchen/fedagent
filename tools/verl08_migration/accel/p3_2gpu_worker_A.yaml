# #3 + worker-eval: 1 client on 2 GPUs, persistent trainer + eval_mode=worker (eval the round's
# starting model on the HOT vLLM engine -> NO second engine, NO eval cold-start). Run two of these
# in parallel (A on GPU 0,1; B on GPU 2,3) = the real "#3 client-parallel + cheap eval" fast path,
# to compare against the 1-GPU layout's 995s. Relies on the VERL_RAY_JOB_ID fix so the two
# concurrent persistent workers don't collide on the /tmp weight-transfer socket.
env_kind: webshop
env_spec: config/envs/webshop_15.yaml
val_env_spec: /gpfs/projects/b1222/userdata/canyu/kangyu/fedagent/_scratch/accel/webshop_val_64.yaml
output_dir: /gpfs/projects/b1222/userdata/canyu/kangyu/fedagent/_scratch/accel/p3_2gpu_worker_A_out
model_path: /projects/b1222/.cache/huggingface/hub/models--Qwen--Qwen2.5-1.5B-Instruct/snapshots/989aa7980e4cf806f80c7fef2b1adb7bc71aa306
total_clients: 1
clients_per_round: 1
total_rounds: 1
epochs_per_round: 3
base_seed: 42
n_gpus_per_node: 2
persistent: true
eval_mode: worker
val_before_train: true
test_freq: 1
save_freq: 100000
wait_between_clients: 8
min_goals_per_client: 100
webshop_pool_size: 16
webshop_base_port: 12000
webshop_val_port: 12090
search_return_n: 50
val_temperature: 0.4
cleanup_checkpoints: false
partition_strategy: ""
client_overrides:
  - data.train_batch_size=8
  - data.max_prompt_length=4096
  - data.max_response_length=512
  - actor_rollout_ref.actor.ppo_mini_batch_size=8
  - actor_rollout_ref.rollout.n=8
  - actor_rollout_ref.rollout.prompt_length=4096
  - actor_rollout_ref.rollout.response_length=512
  - actor_rollout_ref.rollout.max_model_len=4608
  - actor_rollout_ref.rollout.gpu_memory_utilization=0.6
  - actor_rollout_ref.actor.checkpoint.save_contents=[model]
